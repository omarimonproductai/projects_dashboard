<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projectes de Vibecoding</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card-hover: #1f2630;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #1f6feb;
    --success: #3fb950;
    --danger: #f85149;
  }
  body {
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header {
    text-align: center;
    margin-bottom: 3rem;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(90deg, #58a6ff, #bc8cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 1rem;
  }
  .section { margin-bottom: 2.5rem; }
  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(88, 166, 255, 0.15);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .card-icon {
    font-size: 2rem;
    line-height: 1;
  }
  .card-title {
    font-size: 1.2rem;
    font-weight: 600;
    flex: 1;
  }
  .card-github {
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    transition: color 0.15s ease, transform 0.15s ease;
  }
  .card-github:hover { color: var(--text); transform: scale(1.1); }
  .card-github svg { display: block; }
  .card-desc {
    color: var(--text-dim);
    font-size: 0.9rem;
    flex: 1;
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.7rem 1rem;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    text-decoration: none;
  }
  .btn:hover { background: var(--accent-hover); }
  .local-projects {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .local-project-item {
    margin-bottom: 1.25rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .local-project-item:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  .local-project-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .local-project-desc {
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  footer {
    text-align: center;
    margin-top: 3rem;
    color: var(--text-dim);
    font-size: 0.85rem;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Projectes de Vibecoding</h1>
    <div class="subtitle">
      by Oriol Marimón-Clos
      <a href="https://www.linkedin.com/in/omarimon-product-management-data/" target="_blank" rel="noopener" aria-label="LinkedIn de Oriol Marimón-Clos" style="color:inherit;text-decoration:none;margin-left:0.3rem;vertical-align:super;display:inline-block;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12" fill="currentColor" style="display:block;">
          <path d="M4.98 3.5C4.98 4.88 3.88 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.22 8.67h4.56V24H.22V8.67zM8.9 8.67h4.38v2.08h.06c.61-1.16 2.1-2.39 4.32-2.39 4.62 0 5.48 3.03 5.48 6.98V24h-4.56v-7.74c0-1.85-.03-4.24-2.58-4.24-2.58 0-2.98 2.02-2.98 4.11V24H8.9V8.67z"/>
        </svg>
      </a>
    </div>
  </header>

  <div id="sections"></div>
</div>

<script>
const PROJECTS = [
  {
    id: "cooltra_calendar",
    name: "Cooltra Calendar",
    icon: "📅",
    category: "cooltra",
    description: "Calendari de festius 2026-2027",
    url: "https://omarimonagentai.github.io/calendar_company/index.html",
    github_repo: "https://github.com/omarimonagentai/calendar_company"
  },
  {
    id: "cooltra_meteo",
    name: "Cooltra Meteo",
    icon: "🌦",
    category: "cooltra",
    description: "Dashboard meteorologic",
    url: "https://omarimonagentai.github.io/meteo_company/meteo_dashboard.html",
    github_repo: "https://github.com/omarimonagentai/meteo_company"
  },
  {
    id: "la_liga",
    name: "European Leagues",
    icon: "⚽",
    category: "personal",
    description: "Lligues europees 2025/26",
    url: "https://omarimonagentai.github.io/european_leagues/lligues_europees.html",
    github_repo: "https://github.com/omarimonagentai/european_leagues"
  },
  {
    id: "concerts",
    name: "Concerts Calendar",
    icon: "🎵",
    category: "personal",
    description: "Calendari de concerts",
    url: "https://omarimonagentai.github.io/concerts_calendar/calendar.html",
    github_repo: "https://github.com/omarimonagentai/concerts_calendar"
  },
  {
    id: "ligabue",
    name: "My Setlists",
    icon: "🎸",
    category: "personal",
    description: "Reproductor de les playlists dels meus concerts",
    url: "https://omarimonagentai.github.io/musicplaylist/playlist_selector.html",
    github_repo: "https://github.com/omarimonagentai/musicplaylist"
  }
];

const LOCAL_PROJECTS = [
  {
    name: "Desktop Karaoke",
    icon: "🎧",
    description: "Reproductor de playlists (requereix configuració local)"
  },
  {
    name: "TMB",
    icon: "🚌",
    description: "Parades de bus TMB (requereix configuració local)"
  }
];

function makeCard(p) {
  const card = document.createElement('div');
  card.className = 'card';
  
  const githubIcon = p.github_repo
    ? `<a href="${p.github_repo}" target="_blank" rel="noopener" class="card-github" title="Veure repositori a GitHub"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-label="GitHub"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.4 1.2a11.7 11.7 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 6 .4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg></a>`
    : '';
  
  card.innerHTML = `
    <div class="card-header">
      <span class="card-title">${p.name}</span>
      ${githubIcon}
    </div>
    <div class="card-desc">${p.description}</div>
    <a href="${p.url}" target="_blank" rel="noopener" class="btn">Obrir</a>
  `;
  
  return card;
}

function makeSection(title, icon, projects) {
  if (!projects.length) return null;
  const section = document.createElement('section');
  section.className = 'section';
  const h2 = document.createElement('h2');
  h2.className = 'section-title';
  h2.innerHTML = `<span>${title}</span><span style="color:var(--text-dim);font-weight:400;font-size:0.85em">(${projects.length})</span>`;
  section.appendChild(h2);
  const grid = document.createElement('div');
  grid.className = 'grid';
  projects.forEach(p => grid.appendChild(makeCard(p)));
  section.appendChild(grid);
  return section;
}

function makeLocalProjectsSection() {
  const section = document.createElement('section');
  section.className = 'section';
  const h2 = document.createElement('h2');
  h2.className = 'section-title';
  h2.innerHTML = `<span>Projectes locals (no disponibles en línia)</span>`;
  section.appendChild(h2);
  
  const container = document.createElement('div');
  container.className = 'local-projects';
  
  LOCAL_PROJECTS.forEach(p => {
    const item = document.createElement('div');
    item.className = 'local-project-item';
    item.innerHTML = `
      <div class="local-project-name">${p.name}</div>
      <div class="local-project-desc">${p.description}</div>
    `;
    container.appendChild(item);
  });
  
  section.appendChild(container);
  return section;
}

function render() {
  const sectionsEl = document.getElementById('sections');
  const cooltra = PROJECTS.filter(p => p.category === 'cooltra');
  const personal = PROJECTS.filter(p => p.category !== 'cooltra');
  const cooltraLogo = `<img src="https://estatics-nasia.dtibcn.cat/nasia-pro/media/cooltral.760x428.5caf8994.jpg" alt="Cooltra" style="height:1.6em;vertical-align:middle;border-radius:4px">`;
  
  const sections = [
    makeSection('Cooltra', cooltraLogo, cooltra),
    makeSection('Personals', '⭐', personal),
    makeLocalProjectsSection(),
  ].filter(Boolean);
  
  sections.forEach(s => sectionsEl.appendChild(s));
}

// Load on page load
render();
</script>
</body>
</html>
