<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Side Projects</title>
<meta name="description" content="Recull de side projects creats per Oriol Marimón-Clos.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --ink:#1a1530;
    --ink-dim:rgba(26,21,48,.68);
    --ink-faint:rgba(26,21,48,.46);
    --glass:rgba(255,255,255,.55);
    --glass-strong:rgba(255,255,255,.78);
    --line:rgba(26,21,48,.10);
    --line-strong:rgba(26,21,48,.18);
    --grad:linear-gradient(135deg,#ff7e9d 0%,#ffa56b 50%,#ffd166 100%);
    --transition:.18s ease;
  }

  html{scroll-behavior:smooth}
  html,body{height:100%}

  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    color:var(--ink);
    background:#fff5ec;
    min-height:100vh;
    overflow-x:hidden;
    padding:3rem 1.25rem 6rem;
    position:relative;
  }

  body::before,body::after,.blob{
    content:"";position:fixed;border-radius:50%;filter:blur(90px);
    opacity:.85;z-index:0;pointer-events:none;
    animation:float 20s ease-in-out infinite alternate;
  }
  body::before{width:46rem;height:46rem;background:#ffc1d6;top:-14rem;left:-12rem}
  body::after{width:38rem;height:38rem;background:#ffd9a8;bottom:-10rem;right:-8rem;animation-duration:24s;animation-delay:-6s}
  .blob{width:32rem;height:32rem;background:#c5e1ff;top:30%;right:15%;opacity:.7;animation-duration:28s;animation-delay:-12s}
  @keyframes float{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-30px) scale(1.15)}}

  a{color:inherit}

  .container{position:relative;z-index:1;width:min(1180px,100%);margin:0 auto}

  header{text-align:center;margin-bottom:4rem;padding-top:1.5rem}

  h1{
    font-size:clamp(2.2rem,5.6vw,4rem);font-weight:800;letter-spacing:-.035em;
    line-height:1.12;padding:.12em .04em;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;
    color:transparent;margin-bottom:1rem;text-wrap:balance;
  }

  .subtitle{
    color:var(--ink-faint);font-size:.95rem;
    display:inline-flex;align-items:center;justify-content:center;
    gap:.5rem;flex-wrap:wrap;
  }

  .social-link{
    display:inline-flex;align-items:center;justify-content:center;
    text-decoration:none;
    transition:transform .18s ease,opacity .18s ease,color .18s ease;
  }
  .linkedin-link{color:#a07a8a;opacity:.85}
  .linkedin-link:hover{color:#0a66c2;opacity:1}
  .linkedin-icon{width:15px;height:15px;display:block}

  .section{margin-bottom:3rem}
  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:1.2rem;gap:.8rem;
  }
  .section-title{
    font-size:.85rem;letter-spacing:.28em;text-transform:uppercase;
    color:var(--ink-dim);font-weight:700;
  }
  .section-count{
    color:var(--ink-faint);font-size:.78rem;font-variant-numeric:tabular-nums;
    padding:.25rem .65rem;border:1px solid var(--line);border-radius:999px;
    background:var(--glass);backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr));
    gap:1.1rem;
  }

  .section--personal .grid{
    grid-template-columns:repeat(2,calc((100% - 2 * 1.1rem) / 3));
  }
  @media (max-width:720px){
    .section--personal .grid{grid-template-columns:1fr}
  }

  .card{
    position:relative;border-radius:22px;padding:1.6rem 1.5rem 1.4rem;
    background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(255,255,255,.55));
    border:1px solid var(--line-strong);
    backdrop-filter:blur(26px) saturate(160%);
    -webkit-backdrop-filter:blur(26px) saturate(160%);
    display:flex;flex-direction:column;gap:1rem;min-height:200px;
    transition:transform .25s ease,box-shadow .25s ease,background .25s ease;
    overflow:hidden;
    box-shadow:0 8px 32px rgba(214,51,108,.08);
  }
  .card::before{
    content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;
    background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(255,255,255,0) 40%);
    -webkit-mask:linear-gradient(#000,#000) content-box,linear-gradient(#000,#000);
    -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(214,51,108,.18)}

  .card-header{display:flex;align-items:flex-start;gap:.75rem}
  .card-title-wrap{flex:1;min-width:0}
  .card-title{
    font-size:1.2rem;font-weight:700;letter-spacing:-.01em;line-height:1.25;
    color:var(--ink);
  }

  .card-actions{display:flex;align-items:center;gap:.45rem;flex-shrink:0}

  .icon-link,.icon-badge{
    width:30px;height:30px;border-radius:50%;display:inline-flex;
    align-items:center;justify-content:center;color:var(--ink-dim);
    background:rgba(255,255,255,.7);border:1px solid var(--line-strong);
    text-decoration:none;
    transition:color var(--transition),background var(--transition),transform var(--transition);
  }
  .icon-link:hover{color:var(--ink);background:#fff;transform:scale(1.08)}
  .icon-badge{cursor:help}
  .icon-badge svg,.icon-link svg{width:14px;height:14px;display:block}

  .card-desc{
    color:var(--ink-dim);font-size:.95rem;line-height:1.5;flex:1;
  }

  .btn-group{display:flex;gap:.5rem;flex-wrap:wrap}
  .btn-group .btn{flex:1 1 0;min-width:0}

  .btn{
    padding:.72rem .95rem;border-radius:12px;font-weight:600;
    font-size:.92rem;text-decoration:none;text-align:center;
    background:var(--grad);color:#fff;
    transition:transform .2s,filter .2s,box-shadow .2s;
    border:none;cursor:pointer;
    box-shadow:0 4px 14px rgba(255,126,157,.4);
    display:inline-flex;align-items:center;justify-content:center;
  }
  .btn:hover{
    transform:translateY(-1px);filter:brightness(1.06);
    box-shadow:0 8px 22px rgba(255,126,157,.55);
  }

  .btn:focus-visible,
  .icon-link:focus-visible,
  .social-link:focus-visible{
    outline:2px solid #d6336c;outline-offset:3px;
  }

  .local-projects{
    background:rgba(255,255,255,.45);
    border:1px dashed var(--line-strong);
    border-radius:18px;padding:1.4rem 1.5rem;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  }
  .local-project-item{
    padding:1rem 0;border-bottom:1px solid var(--line);
  }
  .local-project-item:first-child{padding-top:0}
  .local-project-item:last-child{padding-bottom:0;border-bottom:none}
  .local-project-name{
    font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:.3rem;
    display:flex;align-items:center;gap:.55rem;
  }
  .local-project-name::before{
    content:"";width:8px;height:8px;border-radius:50%;
    background:#ffa56b;box-shadow:0 0 14px #ffa56b;
  }
  .local-project-desc{color:var(--ink-dim);font-size:.92rem;line-height:1.5}

  .legend{
    display:flex;gap:1.6rem;justify-content:center;flex-wrap:wrap;
    margin-top:3rem;padding-top:2rem;padding-bottom:2.5rem;
    border-top:1px solid var(--line);
    color:var(--ink-faint);font-size:.85rem;
  }
  .legend-item{display:inline-flex;align-items:center;gap:.5rem}
  .legend-icon{
    width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;
    color:var(--ink-dim);flex-shrink:0;
  }
  .legend-icon svg{display:block;width:16px;height:16px}

  @media (max-width:640px){
    body{padding:2rem 1rem 5rem}
    header{margin-bottom:2.5rem}
    h1{font-size:clamp(2rem,9vw,3rem)}
    .card{padding:1.3rem 1.2rem;min-height:auto}
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{
      transition:none!important;animation:none!important;
      scroll-behavior:auto!important;
    }
  }
</style>
</head>

<body>
<div class="blob" aria-hidden="true"></div>

<div class="container">
  <header>
    <h1>My Side Projects</h1>

    <div class="subtitle">
      <span>per Oriol Marimón-Clos</span>
      <a
        href="https://www.linkedin.com/in/omarimon-product-management-data/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn de Oriol Marimón-Clos"
        class="social-link linkedin-link"
      >
        <svg class="linkedin-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="4" fill="currentColor"></rect>
          <circle cx="8" cy="8" r="1.25" fill="#fff5ec"></circle>
          <rect x="6.8" y="10.2" width="2.4" height="7" fill="#fff5ec"></rect>
          <path d="M11.4 10.2h2.3v1c.5-.8 1.4-1.3 2.6-1.3 2.2 0 3.5 1.4 3.5 4v3.3h-2.4v-3c0-1.3-.5-2-1.6-2-1.2 0-1.9.8-1.9 2.2v2.8h-2.4v-7z" fill="#fff5ec"></path>
        </svg>
      </a>
    </div>
  </header>

  <main id="sections" aria-label="Llistat de projectes"></main>

  <section class="legend" aria-label="Llegenda">
    <div class="legend-item">
      <span class="legend-icon" aria-hidden="true" data-icon="github"></span>
      <span>Accés directe al repo</span>
    </div>
    <div class="legend-item">
      <span class="legend-icon" aria-hidden="true" data-icon="mobile"></span>
      <span>Optimitzat pel mòbil</span>
    </div>
  </section>
</div>

<script>
const ICONS = {
  github: `
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.4 1.2a11.7 11.7 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 6 .4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/>
    </svg>
  `,
  mobile: `
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M17 1H7C5.9 1 5 1.9 5 3v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2ZM7 4h10v15H7V4Zm5 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1Z"/>
    </svg>
  `
};

const PROJECTS = [
  {
    id: "cooltra_calendar",
    name: "Cooltra Calendar",
    category: "cooltra",
    description: "Calendari de festius 2026-2027.",
    url: "https://omarimonproductai.github.io/calendar_company/index.html",
    githubRepo: "https://github.com/omarimonproductai/calendar_company",
    mobile: true
  },
  {
    id: "cooltra_meteo",
    name: "Cooltra Meteo",
    category: "cooltra",
    description: "Dashboard meteorològic.",
    url: "https://omarimonproductai.github.io/meteo_company/meteo_dashboard.html",
    githubRepo: "https://github.com/omarimonproductai/meteo_company",
    mobile: false
  },
  {
    id: "cajut",
    name: "Cajut",
    category: "cooltra",
    description: "Pulse de team meeting interactiu.",
    githubRepo: "https://github.com/omarimonproductai/cajut",
    mobile: true,
    buttons: [
      {
        label: "Presenter",
        url: "https://omarimonproductai.github.io/cajut/?ctrl=pulse-presenter-7k2mq"
      },
      {
        label: "Participant",
        url: "https://omarimonproductai.github.io/cajut/?game=team-pulse"
      }
    ]
  },
  {
    id: "tmbnew",
    name: "TMB New",
    category: "personal",
    description: "Mou-te amb TMB (mobile first)",
    url: "https://tmbnew.pages.dev/",
    githubRepo: "https://github.com/omarimonproductai/tmbnew",
    mobile: true
  },
  {
    id: "la_liga",
    name: "European Leagues",
    category: "personal",
    description: "Lligues europees 2025/26.",
    url: "https://omarimonproductai.github.io/european_leagues/lligues_europees.html",
    githubRepo: "https://github.com/omarimonproductai/european_leagues",
    mobile: false
  },
  {
    id: "concerts",
    name: "Concerts Calendar",
    category: "personal",
    description: "Calendari de concerts.",
    url: "https://omarimonproductai.github.io/concerts_calendar/calendar.html",
    githubRepo: "https://github.com/omarimonproductai/concerts_calendar",
    mobile: true
  },
  {
    id: "ligabue",
    name: "My Setlists",
    category: "personal",
    description: "Reproductor de playlists dels meus concerts.",
    url: "https://omarimonproductai.github.io/musicplaylist/playlist_selector.html",
    githubRepo: "https://github.com/omarimonproductai/musicplaylist",
    mobile: true
  }
];

const LOCAL_PROJECTS = [
  {
    name: "Desktop Karaoke",
    description: "Reproductor de playlists. Requereix configuració local."
  }
];

const SECTIONS = [
  { title: "Cooltra", category: "cooltra" },
  { title: "Personals", category: "personal" }
];

function setLegendIcons() {
  document.querySelectorAll("[data-icon]").forEach((el) => {
    const iconName = el.dataset.icon;
    el.innerHTML = ICONS[iconName] || "";
  });
}

function createProjectCard(project) {
  const card = document.createElement("article");
  card.className = "card";

  const header = document.createElement("div");
  header.className = "card-header";

  const titleWrap = document.createElement("div");
  titleWrap.className = "card-title-wrap";

  const title = document.createElement("h3");
  title.className = "card-title";
  title.textContent = project.name;

  titleWrap.appendChild(title);

  const actions = document.createElement("div");
  actions.className = "card-actions";

  if (project.mobile) {
    const mobileBadge = document.createElement("span");
    mobileBadge.className = "icon-badge";
    mobileBadge.title = "Optimitzat per telèfons mòbils";
    mobileBadge.setAttribute("aria-label", "Optimitzat per telèfons mòbils");
    mobileBadge.innerHTML = ICONS.mobile;
    actions.appendChild(mobileBadge);
  }

  if (project.githubRepo) {
    const githubLink = document.createElement("a");
    githubLink.href = project.githubRepo;
    githubLink.target = "_blank";
    githubLink.rel = "noopener noreferrer";
    githubLink.className = "icon-link";
    githubLink.title = "Veure repositori a GitHub";
    githubLink.setAttribute("aria-label", `Veure repositori de ${project.name} a GitHub`);
    githubLink.innerHTML = ICONS.github;
    actions.appendChild(githubLink);
  }

  header.append(titleWrap, actions);

  const description = document.createElement("p");
  description.className = "card-desc";
  description.textContent = project.description;

  const buttons = project.buttons ?? [{ label: "Obrir", url: project.url }];

  card.append(header, description);

  if (buttons.length > 1) {
    const group = document.createElement("div");
    group.className = "btn-group";
    buttons.forEach(({ label, url }) => {
      group.appendChild(createCardButton(project.name, label, url));
    });
    card.appendChild(group);
  } else {
    const { label, url } = buttons[0];
    card.appendChild(createCardButton(project.name, label, url));
  }

  return card;
}

function createCardButton(projectName, label, url) {
  const button = document.createElement("a");
  button.href = url;
  button.target = "_blank";
  button.rel = "noopener noreferrer";
  button.className = "btn";
  button.setAttribute("aria-label", `Obrir ${projectName} – ${label}`);
  button.textContent = label;
  return button;
}

function createSectionTitle(section, count) {
  const wrap = document.createElement("div");
  wrap.className = "section-head";

  const title = document.createElement("h2");
  title.className = "section-title";
  title.textContent = section.title;

  const countEl = document.createElement("span");
  countEl.className = "section-count";
  countEl.textContent = `${count} projecte${count === 1 ? "" : "s"}`;

  wrap.append(title, countEl);
  return wrap;
}

function createProjectSection(sectionConfig, projects) {
  if (!projects.length) return null;

  const section = document.createElement("section");
  section.className = `section section--${sectionConfig.category}`;
  section.setAttribute("aria-labelledby", `${sectionConfig.category}-title`);

  const head = createSectionTitle(sectionConfig, projects.length);
  head.querySelector(".section-title").id = `${sectionConfig.category}-title`;

  const grid = document.createElement("div");
  grid.className = "grid";

  projects.forEach((project) => {
    grid.appendChild(createProjectCard(project));
  });

  section.append(head, grid);

  return section;
}

function createLocalProjectsSection() {
  const section = document.createElement("section");
  section.className = "section";
  section.setAttribute("aria-labelledby", "local-projects-title");

  const head = document.createElement("div");
  head.className = "section-head";

  const title = document.createElement("h2");
  title.id = "local-projects-title";
  title.className = "section-title";
  title.textContent = "Projectes locals";

  const countEl = document.createElement("span");
  countEl.className = "section-count";
  countEl.textContent = `${LOCAL_PROJECTS.length} projecte${LOCAL_PROJECTS.length === 1 ? "" : "s"}`;

  head.append(title, countEl);

  const container = document.createElement("div");
  container.className = "local-projects";

  LOCAL_PROJECTS.forEach((project) => {
    const item = document.createElement("article");
    item.className = "local-project-item";

    const name = document.createElement("h3");
    name.className = "local-project-name";
    name.textContent = project.name;

    const description = document.createElement("p");
    description.className = "local-project-desc";
    description.textContent = project.description;

    item.append(name, description);
    container.appendChild(item);
  });

  section.append(head, container);

  return section;
}

function render() {
  const sectionsEl = document.getElementById("sections");
  const fragment = document.createDocumentFragment();

  SECTIONS.forEach((sectionConfig) => {
    const projects = PROJECTS.filter((project) => project.category === sectionConfig.category);
    const section = createProjectSection(sectionConfig, projects);

    if (section) {
      fragment.appendChild(section);
    }
  });

  fragment.appendChild(createLocalProjectsSection());

  sectionsEl.replaceChildren(fragment);
  setLegendIcons();
}

document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
