<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup 3 · Brutalist Print</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Helvetica Neue","Inter",Arial,sans-serif;
    background:#f1eee5;color:#0a0a0a;min-height:100vh;
    padding:2rem 1.5rem 4rem;
    background-image:
      repeating-linear-gradient(0deg,rgba(0,0,0,.025) 0 1px,transparent 1px 4px);
  }
  .container{width:min(1280px,100%);margin:0 auto}

  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:.6rem 0 1.2rem;border-bottom:2px solid #0a0a0a;
    font-family:"SF Mono","Menlo",monospace;font-size:.78rem;letter-spacing:.04em;
    text-transform:uppercase;
  }
  .topbar a{color:#0a0a0a;text-decoration:underline}
  .topbar a:hover{background:#ff3b00;color:#f1eee5}

  .hero{
    display:grid;grid-template-columns:1fr auto;align-items:end;
    gap:2rem;padding:3rem 0 2.5rem;border-bottom:2px solid #0a0a0a;
  }
  .hero-num{
    font-family:"SF Mono","Menlo",monospace;font-size:.78rem;
    letter-spacing:.04em;color:#666;margin-bottom:1rem;text-transform:uppercase;
  }
  h1{
    font-size:clamp(3rem,11vw,8rem);font-weight:900;line-height:.86;
    letter-spacing:-.055em;text-transform:uppercase;text-wrap:balance;
  }
  h1 em{font-style:italic;font-weight:900;color:#ff3b00}
  .hero-meta{text-align:right;font-family:"SF Mono","Menlo",monospace;font-size:.8rem;line-height:1.6}
  .hero-meta strong{display:block;font-size:1.6rem;font-family:inherit;font-weight:900;letter-spacing:-.02em;margin-bottom:.2rem}

  .section{padding:3rem 0 2rem;border-bottom:2px solid #0a0a0a}
  .section-head{
    display:grid;grid-template-columns:auto 1fr auto;gap:2rem;align-items:baseline;
    margin-bottom:1.8rem;
  }
  .section-num{
    font-family:"SF Mono","Menlo",monospace;font-size:.85rem;letter-spacing:.04em;
    text-transform:uppercase;color:#666;
  }
  .section-title{
    font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;letter-spacing:-.04em;
    text-transform:uppercase;
  }
  .section-count{font-family:"SF Mono","Menlo",monospace;font-size:.85rem;color:#666}

  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:1rem;row-gap:1.6rem}
  .card{
    grid-column:span 6;border:2px solid #0a0a0a;background:#fdfaf1;
    padding:1.5rem 1.5rem 1.3rem;display:flex;flex-direction:column;gap:.9rem;
    position:relative;transition:transform .15s,box-shadow .15s;
  }
  .card:nth-child(3n){grid-column:span 4;background:#0a0a0a;color:#f1eee5}
  .card:nth-child(3n+1){grid-column:span 8}
  .card:nth-child(3n+1).accent{background:#ff3b00;color:#f1eee5;border-color:#ff3b00}
  .card:hover{transform:translate(-3px,-3px);box-shadow:6px 6px 0 #0a0a0a}
  .card:nth-child(3n):hover{box-shadow:6px 6px 0 #ff3b00}

  .card-num{
    font-family:"SF Mono","Menlo",monospace;font-size:.78rem;
    letter-spacing:.04em;text-transform:uppercase;opacity:.6;
  }
  .card-title{
    font-size:clamp(1.6rem,2.6vw,2.2rem);font-weight:900;letter-spacing:-.035em;
    line-height:1;text-transform:uppercase;
  }
  .card-desc{font-size:.98rem;line-height:1.45;flex:1;max-width:50ch}
  .card-foot{
    display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;
    padding-top:.6rem;border-top:1px solid currentColor;flex-wrap:wrap;
  }
  .card-tags{
    display:flex;gap:.5rem;font-family:"SF Mono","Menlo",monospace;font-size:.7rem;
    letter-spacing:.06em;text-transform:uppercase;flex-wrap:wrap;
  }
  .card-tags span{padding:.2rem 0;opacity:.7}
  .card-tags span::before{content:"› "}
  .card-cta{display:flex;gap:.5rem;flex-wrap:wrap}
  .btn{
    display:inline-flex;align-items:center;gap:.45rem;padding:.6rem 1rem;
    border:2px solid currentColor;background:transparent;color:inherit;
    font-family:"SF Mono","Menlo",monospace;font-size:.78rem;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;text-decoration:none;
    transition:background .15s,color .15s;cursor:pointer;
  }
  .btn:hover{background:currentColor}
  .btn:hover span{color:#fdfaf1}
  .card:nth-child(3n) .btn:hover span{color:#0a0a0a}
  .card.accent .btn:hover span,.card:nth-child(3n+1).accent .btn:hover span{color:#ff3b00}
  .repo-link{color:inherit;font-family:"SF Mono","Menlo",monospace;font-size:.75rem;letter-spacing:.04em;text-decoration:underline;opacity:.8}
  .repo-link:hover{opacity:1}

  .local-block{
    margin-top:3rem;padding:1.6rem;border:2px dashed #0a0a0a;
    background:repeating-linear-gradient(45deg,transparent 0 12px,rgba(0,0,0,.04) 12px 24px);
  }
  .local-block h3{font-size:1.2rem;font-weight:900;text-transform:uppercase;letter-spacing:-.02em;margin-bottom:.8rem}
  .local-list{font-family:"SF Mono","Menlo",monospace;font-size:.88rem;line-height:1.6}
  .local-list b{font-weight:700}

  .footer{
    margin-top:3rem;padding-top:1.5rem;border-top:2px solid #0a0a0a;
    display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;
    font-family:"SF Mono","Menlo",monospace;font-size:.78rem;text-transform:uppercase;
  }

  @media (max-width:900px){
    .grid{grid-template-columns:repeat(6,1fr)}
    .card,.card:nth-child(3n),.card:nth-child(3n+1){grid-column:span 6}
    .section-head{grid-template-columns:1fr;gap:.5rem}
    .hero{grid-template-columns:1fr}
    .hero-meta{text-align:left}
  }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <span>Oriol Marimón-Clos / Vibecoding Index</span>
    <span>2026 · <a href="https://www.linkedin.com/in/omarimon-product-management-data/" target="_blank" rel="noopener">LinkedIn ↗</a></span>
  </div>

  <section class="hero">
    <div>
      <div class="hero-num">№ 001 / Projectes</div>
      <h1>Vibe<em>coding</em><br>Archive.</h1>
    </div>
    <div class="hero-meta">
      <strong>07</strong>web projects<br>
      <strong>02</strong>categories<br>
      <strong>∞</strong>curiosity
    </div>
  </section>

  <main id="sections"></main>

  <div class="footer">
    <span>END OF DOCUMENT — set in Helvetica & SF Mono</span>
    <span>Press to enlarge ↗</span>
  </div>
</div>

<script src="data.js"></script>
<script>
const ICONS={
  github:`<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.4 1.2a11.7 11.7 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 6 .4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg>`
};
const main=document.getElementById("sections");
let projIdx=0;
SECTIONS.forEach((sec,si)=>{
  const items=PROJECTS.filter(p=>p.category===sec.category);
  const cards=items.map((p,i)=>{
    projIdx++;
    const buttons=p.buttons||[{label:"Open",url:p.url}];
    const btns=buttons.map(b=>`<a class="btn" href="${b.url}" target="_blank" rel="noopener"><span>${b.label} ↗</span></a>`).join("");
    const tags=[];
    if(p.mobile) tags.push("Mobile");
    tags.push(p.category==="cooltra"?"Work":"Personal");
    const accent=(si===0&&i===0)?"accent":"";
    return `<article class="card ${accent}">
      <div class="card-num">№ ${String(projIdx).padStart(2,"0")} / ${sec.title}</div>
      <div class="card-title">${p.name}</div>
      <p class="card-desc">${p.description}</p>
      <div class="card-foot">
        <div class="card-tags">${tags.map(t=>`<span>${t}</span>`).join("")}</div>
        <div class="card-cta">
          ${btns}
          ${p.githubRepo?`<a class="repo-link" href="${p.githubRepo}" target="_blank" rel="noopener">${ICONS.github} repo</a>`:""}
        </div>
      </div>
    </article>`;
  }).join("");
  main.insertAdjacentHTML("beforeend",`
    <section class="section">
      <div class="section-head">
        <div class="section-num">§ ${String(si+1).padStart(2,"0")}</div>
        <div class="section-title">${sec.title}</div>
        <div class="section-count">${String(items.length).padStart(2,"0")} items</div>
      </div>
      <div class="grid">${cards}</div>
    </section>`);
});
if(LOCAL_PROJECTS.length){
  const locals=LOCAL_PROJECTS.map(l=>`<div>› <b>${l.name}</b> — ${l.description}</div>`).join("");
  main.insertAdjacentHTML("beforeend",`
    <div class="local-block">
      <h3>// Local-only Appendix</h3>
      <div class="local-list">${locals}</div>
    </div>`);
}
</script>
</body>
</html>
